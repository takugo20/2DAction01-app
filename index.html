    context.translate(
      enemy.x +
        enemy.width / 2,

      enemy.y +
        enemy.height / 2
    );

    context.scale(
      enemy.direction,

      enemy.alive
        ? 1
        : 0.35
    );

    /*
      敵の胴体です。
    */
    context.fillStyle =
      definition.color;

    context.fillRect(
      -enemy.width / 2,
      -enemy.height / 2,
      enemy.width,
      enemy.height
    );

    /*
      敵の顔部分です。
    */
    context.fillStyle =
      definition.faceColor;

    context.fillRect(
      -enemy.width / 2 + 4,
      -enemy.height / 2 + 4,
      enemy.width - 8,
      12
    );

    /*
      目を描きます。
    */
    context.fillStyle =
      "#222";

    context.fillRect(
      4,
      -8,
      4,
      5
    );

    /*
      足を描きます。
    */
    context.fillRect(
      -14,
      enemy.height / 2 - 4,
      11,
      5
    );

    context.fillRect(
      3,
      enemy.height / 2 - 4,
      11,
      5
    );

    drawEnemyDecoration(
      enemy
    );

    context.restore();
  }
}

    function drawCoins() {
      for (
        const coin of
        coins
      ) {
        if (coin.collected) {
          continue;
        }

        coin.animationTime +=
          0.05;

        const scaleX =
          0.35 +
          Math.abs(
            Math.sin(
              coin.animationTime
            )
          ) *
          0.65;

        context.save();

        context.translate(
          coin.x,
          coin.y
        );

        context.scale(
          scaleX,
          1
        );

        context.fillStyle =
          "#ffd11a";

        context.beginPath();

        context.arc(
          0,
          0,
          coin.radius,
          0,
          Math.PI * 2
        );

        context.fill();

        context.strokeStyle =
          "#db8d00";

        context.lineWidth =
          3;

        context.stroke();

        context.fillStyle =
          "rgba(255, 255, 255, 0.6)";

        context.fillRect(
          -3,
          -7,
          3,
          8
        );

        context.restore();
      }
    }

    function drawGoal() {
      if (!goal) {
        return;
      }

      context.fillStyle =
        "#d7d7d7";

      context.fillRect(
        goal.x - 3,
        goal.y -
          TILE_SIZE * 2,
        6,
        TILE_SIZE * 3
      );

      context.fillStyle =
        "#ff4e4e";

      context.beginPath();

      context.moveTo(
        goal.x + 3,
        goal.y -
          TILE_SIZE * 2
      );

      context.lineTo(
        goal.x + 42,
        goal.y -
          TILE_SIZE * 2 +
          14
      );

      context.lineTo(
        goal.x + 3,
        goal.y -
          TILE_SIZE * 2 +
          28
      );

      context.closePath();
      context.fill();

      context.fillStyle =
        "#555";

      context.fillRect(
        goal.x - 13,
        goal.y +
          TILE_SIZE -
          7,
        26,
        7
      );
    }

    function drawParticles() {
      for (
        const particle of
        particles
      ) {
        const alpha =
          particle.life /
          particle.maximumLife;

        context.fillStyle =
          "rgba(210, 190, 160, " +
          alpha +
          ")";

        context.beginPath();

        context.arc(
          particle.x,
          particle.y,

          particle.size *
            alpha,

          0,
          Math.PI * 2
        );

        context.fill();
      }
    }

    function drawGame() {
      const ratio =
        Math.min(
          window.devicePixelRatio ||
          1,
          2
        );

      context.setTransform(
        ratio,
        0,
        0,
        ratio,
        0,
        0
      );

      context.clearRect(
        0,
        0,
        viewportWidth,
        viewportHeight
      );

      drawBackground();

      context.save();

      const verticalOffset =
        viewportHeight -
        stageHeight;

      context.translate(
        -cameraX,
        verticalOffset
      );

      drawStage();
      drawGoal();
      drawCoins();
      drawEnemies();
      drawPlayer();
      drawParticles();

      context.restore();
    }

    // =========================================================
    // HUD・ゲームループ
    // =========================================================

    function updateHud() {
      scoreValue.textContent =
        score;

      coinValue.textContent =
        collectedCoins;

      missValue.textContent =
        missCount;
    }

    function updateGame(
      deltaTime
    ) {
      if (gamePaused) {
        return;
      }

      updatePlayer(deltaTime);
      updateEnemies(deltaTime);
      updateObjectCollisions();
      updateParticles(deltaTime);
      updateCamera(deltaTime);
    }

    function gameLoop(
      currentTime
    ) {
      if (!lastTime) {
        lastTime =
          currentTime;
      }

      const deltaTime =
        Math.min(
          (
            currentTime -
            lastTime
          ) /
          1000,

          0.033
        );

      lastTime =
        currentTime;

      updateGame(deltaTime);
      drawGame();

      window.requestAnimationFrame(
        gameLoop
      );
    }

    // =========================================================
    // キーボード操作
    // =========================================================

    function handleKeyDown(
      event
    ) {
      const key =
        event.key.toLowerCase();

      if (gamePaused) {
        return;
      }

      ensureAudioContext();

      if (
        key === "arrowleft" ||
        key === "a"
      ) {
        input.left =
          true;

        event.preventDefault();
      }

      if (
        key === "arrowright" ||
        key === "d"
      ) {
        input.right =
          true;

        event.preventDefault();
      }

      if (
        key === "arrowup" ||
        key === "w" ||
        key === " "
      ) {
        if (
          !input.jump &&
          !event.repeat
        ) {
          input.jumpPressed =
            true;
        }

        input.jump =
          true;

        input.jumpReleased =
          false;

        event.preventDefault();
      }

      if (
        key === "shift" ||
        key === "x"
      ) {
        keyboardDashHeld =
          true;

        updateDashInput();

        event.preventDefault();
      }

      if (
        key === "r" &&
        !event.repeat
      ) {
        initializeGame(true);
      }
    }

    function handleKeyUp(
      event
    ) {
      const key =
        event.key.toLowerCase();

      if (
        key === "arrowleft" ||
        key === "a"
      ) {
        input.left =
          false;
      }

      if (
        key === "arrowright" ||
        key === "d"
      ) {
        input.right =
          false;
      }

      if (
        key === "arrowup" ||
        key === "w" ||
        key === " "
      ) {
        if (input.jump) {
          input.jumpReleased =
            true;
        }

        input.jump =
          false;
      }

      if (
        key === "shift" ||
        key === "x"
      ) {
        keyboardDashHeld =
          false;

        updateDashInput();
      }
    }

    window.addEventListener(
      "keydown",
      handleKeyDown,
      {
        passive: false
      }
    );

    window.addEventListener(
      "keyup",
      handleKeyUp
    );

    // =========================================================
    // タッチ操作
    // =========================================================

    const activePointerReleases =
      new Map();

    function bindHoldButton(
      element,
      onPress,
      onRelease
    ) {
      const pointerIds =
        new Set();

      function releasePointerById(
        pointerId
      ) {
        if (
          !pointerIds.has(
            pointerId
          )
        ) {
          return;
        }

        pointerIds.delete(
          pointerId
        );

        activePointerReleases.delete(
          pointerId
        );

        if (
          pointerIds.size === 0
        ) {
          element.classList.remove(
            "active"
          );

          onRelease();
        }
      }

      function releaseAllPointers() {
        const hadPointers =
          pointerIds.size > 0;

        for (
          const pointerId of
          pointerIds
        ) {
          activePointerReleases.delete(
            pointerId
          );

          try {
            if (
              element.hasPointerCapture(
                pointerId
              )
            ) {
              element.releasePointerCapture(
                pointerId
              );
            }
          } catch (error) {
            /*
              Pointer Captureを解除できなくても
              入力状態の解除は続行します。
            */
          }
        }

        pointerIds.clear();

        element.classList.remove(
          "active"
        );

        /*
          押されていた場合だけ、
          解除処理を1回実行します。
        */
        if (hadPointers) {
          onRelease();
        }
      }

      element.addEventListener(
        "pointerdown",
        event => {
          if (gamePaused) {
            return;
          }

          ensureAudioContext();
          event.preventDefault();

          if (
            pointerIds.has(
              event.pointerId
            )
          ) {
            return;
          }

          pointerIds.add(
            event.pointerId
          );

          activePointerReleases.set(
            event.pointerId,
            () => {
              releasePointerById(
                event.pointerId
              );
            }
          );

          try {
            element.setPointerCapture(
              event.pointerId
            );
          } catch (error) {
            /*
              Pointer Captureに失敗した場合も、
              document側のpointerupで解除します。
            */
          }

          element.classList.add(
            "active"
          );

          onPress();
        },
        {
          passive: false
        }
      );

      element.addEventListener(
        "pointerup",
        event => {
          event.preventDefault();

          releasePointerById(
            event.pointerId
          );
        },
        {
          passive: false
        }
      );

      element.addEventListener(
        "pointercancel",
        event => {
          event.preventDefault();

          releasePointerById(
            event.pointerId
          );
        },
        {
          passive: false
        }
      );

      element.addEventListener(
        "lostpointercapture",
        event => {
          releasePointerById(
            event.pointerId
          );
        }
      );

      element.addEventListener(
        "contextmenu",
        event => {
          event.preventDefault();
          releaseAllPointers();
        }
      );

      element.addEventListener(
        "dragstart",
        event => {
          event.preventDefault();
          releaseAllPointers();
        }
      );

      element.releaseAllPointers =
        releaseAllPointers;
    }

    function bindMoveButton(
      element,
      direction
    ) {
      let lastPressTime =
        -Infinity;

      let dashActive =
        false;

      bindHoldButton(
        element,

        () => {
          const currentTime =
            performance.now() /
            1000;

          const isDoubleTap =
            currentTime -
              lastPressTime <=
            MOVE_DOUBLE_TAP_TIME;

          lastPressTime =
            currentTime;

          if (
            direction ===
            "left"
          ) {
            input.left =
              true;
          } else {
            input.right =
              true;
          }

          if (isDoubleTap) {
            dashActive =
              true;

            touchDashDirections.add(
              direction
            );

            updateDashInput();
          }
        },

        () => {
          if (
            direction ===
            "left"
          ) {
            input.left =
              false;
          } else {
            input.right =
              false;
          }

          if (dashActive) {
            dashActive =
              false;

            touchDashDirections.delete(
              direction
            );

            updateDashInput();
          }
        }
      );

      /*
        ステージ移動などの際に、
        古いダブルタップ時刻を破棄します。
      */
      element.resetMoveTapState =
        () => {
          lastPressTime =
            -Infinity;

          dashActive =
            false;

          touchDashDirections.delete(
            direction
          );
        };
    }

    bindMoveButton(
      leftButton,
      "left"
    );

    bindMoveButton(
      rightButton,
      "right"
    );

    bindHoldButton(
      jumpButton,

      () => {
        if (!input.jump) {
          input.jumpPressed =
            true;
        }

        input.jump =
          true;

        input.jumpReleased =
          false;
      },

      () => {
        if (input.jump) {
          input.jumpReleased =
            true;
        }

        input.jump =
          false;
      }
    );

    document.addEventListener(
      "pointerup",
      event => {
        const releasePointer =
          activePointerReleases.get(
            event.pointerId
          );

        if (releasePointer) {
          releasePointer();
        }
      }
    );

    document.addEventListener(
      "pointercancel",
      event => {
        const releasePointer =
          activePointerReleases.get(
            event.pointerId
          );

        if (releasePointer) {
          releasePointer();
        }
      }
    );

    function resetAllInputs() {
      input.left =
        false;

      input.right =
        false;

      input.jump =
        false;

      input.jumpPressed =
        false;

      input.jumpReleased =
        false;

      input.dash =
        false;

      keyboardDashHeld =
        false;

      touchDashDirections.clear();

      const touchButtons = [
        leftButton,
        rightButton,
        jumpButton
      ];

      for (
        const button of
        touchButtons
      ) {
        if (
          typeof button.releaseAllPointers ===
          "function"
        ) {
          button.releaseAllPointers();
        } else {
          button.classList.remove(
            "active"
          );
        }

        if (
          typeof button.resetMoveTapState ===
          "function"
        ) {
          button.resetMoveTapState();
        }
      }

      activePointerReleases.clear();
      updateDashInput();
    }

    window.addEventListener(
      "blur",
      resetAllInputs
    );

    document.addEventListener(
      "visibilitychange",
      () => {
        if (document.hidden) {
          resetAllInputs();
        }
      }
    );

    window.addEventListener(
      "orientationchange",
      resetAllInputs
    );

    // =========================================================
    // ズーム防止
    // =========================================================

    let lastNonButtonTouchEndTime =
      0;

    document.addEventListener(
      "touchend",
      event => {
        const target =
          event.target;

        if (
          target instanceof Element &&
          target.closest(
            "button, .touch-button"
          )
        ) {
          return;
        }

        const currentTime =
          Date.now();

        const elapsedTime =
          currentTime -
          lastNonButtonTouchEndTime;

        if (
          elapsedTime > 0 &&
          elapsedTime < 350
        ) {
          event.preventDefault();
        }

        lastNonButtonTouchEndTime =
          currentTime;
      },
      {
        passive: false
      }
    );

    document.addEventListener(
      "dblclick",
      event => {
        const target =
          event.target;

        if (
          target instanceof Element &&
          target.closest(
            "button, .touch-button"
          )
        ) {
          return;
        }

        event.preventDefault();
      },
      {
        passive: false
      }
    );

    const gestureEventNames = [
      "gesturestart",
      "gesturechange",
      "gestureend"
    ];

    for (
      const eventName of
      gestureEventNames
    ) {
      document.addEventListener(
        eventName,
        event => {
          event.preventDefault();
        },
        {
          passive: false
        }
      );
    }

    // =========================================================
    // 画面ボタン
    // =========================================================

    restartButton.addEventListener(
      "click",
      () => {
        if (gamePaused) {
          return;
        }

        ensureAudioContext();
        initializeGame(true);
      }
    );

    stageSelectButton.addEventListener(
      "click",
      () => {
        showStageSelectScreen();
      }
    );

    nextStageButton.addEventListener(
      "click",
      () => {
        const nextStageIndex =
          currentStageIndex +
          1;

        if (
          nextStageIndex <
          STAGES.length
        ) {
          startStage(
            nextStageIndex
          );
        }
      }
    );

    messageRestartButton.addEventListener(
      "click",
      () => {
        ensureAudioContext();

        hideMessage();
        initializeGame(true);

        gamePaused =
          false;

        lastTime =
          performance.now();
      }
    );

    messageStageSelectButton.addEventListener(
      "click",
      () => {
        showStageSelectScreen();
      }
    );

    // =========================================================
    // Canvasサイズ
    // =========================================================

    function resizeCanvas() {
      const ratio =
        Math.min(
          window.devicePixelRatio ||
          1,
          2
        );

      viewportWidth =
        window.innerWidth;

      viewportHeight =
        window.innerHeight;

      canvas.width =
        Math.floor(
          viewportWidth *
          ratio
        );

      canvas.height =
        Math.floor(
          viewportHeight *
          ratio
        );

      canvas.style.width =
        viewportWidth +
        "px";

      canvas.style.height =
        viewportHeight +
        "px";

      context.setTransform(
        ratio,
        0,
        0,
        ratio,
        0,
        0
      );
    }

    window.addEventListener(
      "resize",
      resizeCanvas
    );

    window.addEventListener(
      "orientationchange",
      () => {
        window.setTimeout(
          resizeCanvas,
          150
        );
      }
    );

    // =========================================================
    // ゲーム開始
    // =========================================================

    resizeCanvas();

    currentStageIndex =
      0;

    initializeGame(true);
    showStageSelectScreen();

    window.requestAnimationFrame(
      gameLoop
    );
  </script>
</body>
</html>
